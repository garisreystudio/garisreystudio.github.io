<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Garisrey — Links</title>
  <meta name="description" content="Garisrey — From East to Peace. Temukan kami di semua platform."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #CC0000;
      --black: #080808;
      --black2: #111111;
      --black3: #1a1a1a;
      --white: #FAFAFA;
      --gray: #777777;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Space Mono', monospace;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── BACKGROUND TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 700px 500px at 15% 20%, rgba(204,0,0,.06) 0%, transparent 70%),
        radial-gradient(ellipse 500px 400px at 85% 80%, rgba(204,0,0,.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Scanlines subtle */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.08) 3px,
        rgba(0,0,0,.08) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── CORNER MARKS ── */
    .corner {
      position: fixed;
      width: 32px;
      height: 32px;
      z-index: 1;
    }
    .corner.tl { top: 20px; left: 20px; border-top: 1px solid rgba(204,0,0,.3); border-left: 1px solid rgba(204,0,0,.3); }
    .corner.tr { top: 20px; right: 20px; border-top: 1px solid rgba(204,0,0,.3); border-right: 1px solid rgba(204,0,0,.3); }
    .corner.bl { bottom: 20px; left: 20px; border-bottom: 1px solid rgba(204,0,0,.3); border-left: 1px solid rgba(204,0,0,.3); }
    .corner.br { bottom: 20px; right: 20px; border-bottom: 1px solid rgba(204,0,0,.3); border-right: 1px solid rgba(204,0,0,.3); }

    /* ── MAIN CONTAINER ── */
    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeUp .7s cubic-bezier(.4,0,.2,1) both;
    }

    .logo-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 18px;
      position: relative;
    }

    /* Red ring spin */
    .logo-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(204,0,0,.2);
      animation: spin 8s linear infinite;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      top: -3px; left: 50%;
      transform: translateX(-50%);
      width: 5px; height: 5px;
      background: var(--red);
      border-radius: 50%;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 0 20px rgba(204,0,0,.25));
    }

    .logo-wordmark {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 36px;
      letter-spacing: -.01em;
      line-height: 1;
      color: var(--white);
      display: none;
    }

    .logo-wordmark em { color: var(--red); }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 28px;
      letter-spacing: -.01em;
      color: var(--white);
      margin-bottom: 6px;
    }

    .brand-name em { color: var(--red); }

    .tagline {
      font-size: 7px;
      font-weight: 700;
      letter-spacing: .45em;
      text-transform: uppercase;
      color: rgba(255,255,255,.28);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .tagline::before, .tagline::after {
      content: '';
      width: 28px;
      height: 1px;
      background: rgba(204,0,0,.4);
    }

    /* ── LINKS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--black2);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 4px;
      text-decoration: none;
      color: var(--white);
      position: relative;
      overflow: hidden;
      transition: border-color .25s, transform .25s;
      animation: fadeUp .7s cubic-bezier(.4,0,.2,1) both;
    }

    /* Stagger animation delays */
    .link-item:nth-child(1) { animation-delay: .15s; }
    .link-item:nth-child(2) { animation-delay: .22s; }
    .link-item:nth-child(3) { animation-delay: .29s; }
    .link-item:nth-child(4) { animation-delay: .36s; }
    .link-item:nth-child(5) { animation-delay: .43s; }

    /* Hover glow line on left */
    .link-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--link-accent, var(--red));
      transform: scaleY(0);
      transform-origin: center;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }

    /* Hover shimmer */
    .link-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.03) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }

    .link-item:hover {
      border-color: rgba(255,255,255,.14);
      transform: translateX(4px);
    }

    .link-item:hover::before { transform: scaleY(1); }
    .link-item:hover::after  { transform: translateX(200%); }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      transition: background .25s;
    }

    .link-item:hover .link-icon {
      background: rgba(255,255,255,.07);
    }

    .link-icon img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    /* SVG icons fallback */
    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .link-text {
      flex: 1;
      min-width: 0;
    }

    .link-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 2px;
    }

    .link-sub {
      font-size: 9px;
      color: rgba(255,255,255,.3);
      letter-spacing: .04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      font-size: 16px;
      color: rgba(255,255,255,.2);
      transition: color .25s, transform .25s;
      flex-shrink: 0;
    }

    .link-item:hover .link-arrow {
      color: var(--link-accent, var(--red));
      transform: translateX(3px);
    }

    /* ── PLATFORM COLORS ── */
    .lnk-shopee  { --link-accent: #ff5f00; }
    .lnk-wa      { --link-accent: #25d366; }
    .lnk-ig      { --link-accent: #e1306c; }
    .lnk-tiktok  { --link-accent: #ffffff; }
    .lnk-web     { --link-accent: var(--red); }

    /* ── FOOTER ── */
    .foot {
      margin-top: 32px;
      text-align: center;
      animation: fadeUp .7s .5s cubic-bezier(.4,0,.2,1) both;
    }

    .foot-txt {
      font-size: 7px;
      font-weight: 700;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: rgba(255,255,255,.15);
    }

    .foot-txt a {
      color: rgba(204,0,0,.5);
      text-decoration: none;
      transition: color .2s;
    }

    .foot-txt a:hover { color: var(--red); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      body { padding: 32px 16px; }
      .logo-wrap { width: 76px; height: 76px; }
      .brand-name { font-size: 24px; }
      .corner { width: 24px; height: 24px; }
      .link-item { padding: 14px 16px; gap: 12px; }
      .link-icon { width: 36px; height: 36px; }
      .link-icon img { width: 18px; height: 18px; }
    }
  </style>
</head>
<body>

  <!-- Corner marks -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>

      <a

      <!-- TikTok -->

          <img src="../assets/logo/tiktok.png" alt="TikTok"

      <!-- Website -->

    </div>

    <!-- ── FOOTER ── -->
    <div class="foot">
      <p class="foot-txt">
        © 2025 <a href="https://garisreystudio.github.io/">Garisrey</a> · Made in Indonesia
      </p>
    </div>

  </div>

</body>
</html>
