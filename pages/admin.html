<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Garisrey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/admin.css" />
    <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VRZNCTG43K"></script>
  <script>

</head>
  <body>
    <!-- AUTH GATE -->
    <div id="authGate">
      <div class="spinner"></div>
      <div class="auth-txt" id="authMsg">Memverifikasi akses...</div>
    </div>

    <!-- TOAST -->
    <div class="toast-wrap" id="toastWrap"></div>

    <!-- LAYOUT -->
    <div class="layout" id="adminLayout" style="display: none">
      <!-- MOBILE OVERLAY -->
      <div
        id="sbOverlay"
        style="
          display: none;
          position: fixed;
          inset: 0;
          z-index: 190;
          background: rgba(0, 0, 0, 0.55);
        "
        onclick="closeSB()"
      ></div>

      <!-- ════════════════════ SIDEBAR ════════════════════ -->
      <aside class="sidebar" id="sidebar">
        <div class="sb-head">
          <div class="sb-logo">
            <img
              id="sbLogoImg"
              src="../assets/logo/logo.png"
              alt="Garisrey"
              style="height: 72px; width: auto; object-fit: contain"
              onerror="
                this.onerror = null;
                this.src = '../assets/logo/logo.png';
                this.onerror = function () {
                  this.style.display = 'none';
                  document.getElementById('sbWordmark').style.display = 'block';
                };
              "
            />
            <div
              id="sbWordmark"
              style="
                display: none;
                font-family: &quot;DM Serif Display&quot;, serif;
                font-style: italic;
                font-size: 26px;
                color: #f0ebe3;
                letter-spacing: -0.01em;
                text-align: center;
              "
            >
              Garis<em style="color: var(--red)">rey.</em>
            </div>
            <div class="sb-role">Admin Panel</div>
          </div>
        </div>

        <div class="sb-nav">
          <div class="nav-group-lbl">Dashboard</div>
          <div class="nav-item active" id="n-home" onclick="go('home')">
            <span class="ico">🏠</span>Beranda
          </div>
          <div class="nav-group-lbl">Katalog</div>
          <div class="nav-item" id="n-add" onclick="go('add')">
            <span class="ico">➕</span>Tambah Produk
          </div>

          <div class="nav-group-lbl">Pengaturan</div>
          <div class="nav-item" id="n-beranda" onclick="go('beranda')">
            <span class="ico">🎬</span>Atur Beranda
          </div>
          <div class="nav-item" id="n-assets" onclick="go('assets')">
            <span class="ico">📁</span>Kelola Aset
          </div>

          <div class="nav-group-lbl">Eksternal</div>
          <div
            class="nav-item"
            onclick="window.open('../index.html', '_blank')"
          >
            <span class="ico">🌐</span>Lihat Website
          </div>
          <div class="nav-item" onclick="window.open('shop.html', '_blank')">
            <span class="ico">🛍️</span>Lihat Toko
          </div>
        </div>

        <div class="sb-foot">
          <div class="user-row">
            <div class="user-av" id="userAv">A</div>
            <div class="user-info">
              <div class="user-name" id="uName">Admin</div>
              <div class="user-email" id="uEmail"></div>
            </div>
            <button class="logout-btn" onclick="doLogout()" title="Keluar">
              ⏻
            </button>
          </div>
        </div>
      </aside>

      <!-- ════════════════════ MAIN ════════════════════ -->
      <div class="main">
        <div class="topbar">
          <div class="topbar-left">
            <div class="ham-admin" onclick="toggleSB()">
              <span></span><span></span><span></span>
            </div>
            <span class="topbar-title" id="topTitle">Beranda</span>
          </div>
          <div class="topbar-right">
            <span class="badge-live">Live</span>
            <span class="prod-count-badge" id="prodCount">0 Produk</span>
          </div>
        </div>

        <div class="content" id="pageContent"></div>
      </div>
    </div>
    <!-- /layout -->

    <!-- DELETE MODAL -->
    <div class="modal-bg" id="delModal" style="display: none">
      <div class="modal-box">
        <div class="modal-title">Hapus Produk?</div>
        <div class="modal-sub">
          Produk <strong id="delName" style="color: #f0ebe3"></strong> akan
          dihapus permanen.
        </div>
        <div
          style="
            background: rgba(204, 0, 0, 0.06);
            border: 1px solid rgba(204, 0, 0, 0.15);
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 9.5px;
            color: #ff8080;
            margin-bottom: 4px;
          "
        >
          ⚠️ Tindakan ini tidak dapat dibatalkan!
        </div>
        <div class="modal-acts">
          <button
            class="btn btn-out"
            onclick="document.getElementById('delModal').style.display = 'none'"
          >
            Batal
          </button>
          <button class="btn btn-red" onclick="execDelete()">Ya, Hapus</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      /* ── GLOBAL UTILITIES (inline) ── */
      var SUPABASE_URL = "https://lpkbbrjyscwmdowxexbx.supabase.co";
      var SUPABASE_ANON = "sb_publishable_7Pl3BeLfdECmKoyi1bqMtA_SA1CoCsv";
      var ADMIN_EMAIL = "garisrey8@gmail.com";
      var WA_NUMBER = "628131003247";
      let sb;
      function initSupabase() {
        if (typeof supabase !== "undefined" && supabase.createClient) {
          sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        }
        return sb;
      }
      const fmt = (n) =>
        (n || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      const disc = (p) =>
        p.price_ori > p.price
          ? Math.round((1 - p.price / p.price_ori) * 100)
          : 0;
      function getWishlist() {
        try {
          return JSON.parse(localStorage.getItem("gr_wishlist") || "[]");
        } catch {
          return [];
        }
      }
      function saveWishlist(list) {
        localStorage.setItem("gr_wishlist", JSON.stringify(list));
      }
      function toggleWishlistItem(id, onSuccess) {
        const list = getWishlist();
        const idx = list.indexOf(id);
        if (idx === -1) {
          list.push(id);
        } else {
          list.splice(idx, 1);
        }
        saveWishlist(list);
        if (onSuccess) onSuccess(list);
      }
      function showToast(msg, type = "info") {
        const icons = { ok: "✅", err: "❌", info: "ℹ️" };
        let wrap = document.getElementById("toastWrap");
        if (!wrap) {
          wrap = document.createElement("div");
          wrap.id = "toastWrap";
          wrap.className = "toast-wrap";
          document.body.appendChild(wrap);
        }
        const el = document.createElement("div");
        el.className = "toast t-" + type;
        el.innerHTML =
          '<span style="flex-shrink:0">' +
          (icons[type] || "") +
          "</span><span>" +
          msg +
          "</span>";
        wrap.appendChild(el);
        setTimeout(() => {
          el.style.opacity = "0";
          el.style.transform = "translateX(12px)";
          setTimeout(() => el.remove(), 300);
        }, 3200);
      }
      async function doLogout() {
        if (!sb) return;
        await sb.auth.signOut();
        window.location.href = "../index.html";
      }
      function loadAssetWithFallback(el, localPath, storagePath) {
        if (!el) return;
        el.src = localPath;
        el.onerror = () => {
          if (!sb) {
            el.onerror = null;
            return;
          }
          const { data } = sb.storage.from("assets").getPublicUrl(storagePath);
          el.src = data.publicUrl;
          el.onerror = null;
        };
      }
      function animateCounter(elId, target, duration = 1500) {
        const el = document.getElementById(elId);
        if (!el) return;
        const start = performance.now();
        const step = (ts) => {
          const progress = Math.min((ts - start) / duration, 1);
          el.textContent = Math.floor(progress * target);
          if (progress < 1) requestAnimationFrame(step);
          else el.textContent = target;
        };
        requestAnimationFrame(step);
      }
      window.doLogout = doLogout;
      window.showToast = showToast;
    </script>
    <script src="../assets/js/admin.js"></script>
  </body>
</html>
